<!DOCTYPE html>
<html>
<head>
    <title>Hypothesis Test Calculator</title>
</head>
<body>
    <h1>Hypothesis Test Calculator</h1>
    <form id="testForm">
        <label for="data">Data (comma or space separated):</label>
        <input type="text" id="data" name="data" required>
        
        <label for="alpha">Alpha (significance level):</label>
        <input type="number" id="alpha" name="alpha" value="0.05" step="0.01">
        
        <label for="mu">Mu (population mean):</label>
        <input type="number" id="mu" name="mu" value="0">
        
        <label for="alternative">Alternative Hypothesis:</label>
        <select id="alternative" name="alternative">
            <option value="two-sided">Two-sided</option>
            <option value="less">Less than</option>
            <option value="greater">Greater than</option>
        </select>
        
        <button type="submit">Calculate</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(document.getElementById('testForm'));
            const response = await fetch('/test', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        });
    </script>
</body>
</html>
