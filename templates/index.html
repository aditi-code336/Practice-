<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypothesis Test Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Courier New', monospace;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #result {
            margin-top: 30px;
        }
        
        .result-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
        }
        
        .error {
            background: #fee;
            border-left-color: #e74c3c;
            color: #c0392b;
        }
        
        .success {
            background: #eef;
            border-left-color: #667eea;
            color: #333;
        }
        
        .help-text {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Hypothesis Test Calculator</h1>
        
        <form id="testForm">
            <div class="form-group">
                <label for="data">Data (CSV Format)</label>
                <textarea id="data" name="data" placeholder="Enter your data values separated by commas&#10;Example: 2.3, 4.5, 3.1, 5.2" required></textarea>
                <div class="help-text">Enter comma-separated values or paste your CSV data here</div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="alpha">Alpha (Significance Level)</label>
                    <input type="number" id="alpha" name="alpha" value="0.05" min="0" max="1" step="0.01" required>
                    <div class="help-text">Typically 0.05 or 0.01</div>
                </div>
                
                <div class="form-group">
                    <label for="mu">Mu (Population Mean)</label>
                    <input type="number" id="mu" name="mu" value="0" step="0.1" required>
                    <div class="help-text">Hypothesized mean value</div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="alternative">Alternative Hypothesis</label>
                <select id="alternative" name="alternative" required>
                    <option value="two-sided">Two-sided (μ ≠ μ₀)</option>
                    <option value="less">Less than (μ < μ₀)</option>
                    <option value="greater">Greater than (μ > μ₀)</option>
                </select>
            </div>
            
            <button type="submit">🔍 Calculate</button>
        </form>
        
        <div id="result"></div>
    </div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="result-box success">Calculating...</div>';
            
            try {
                const formData = new FormData(document.getElementById('testForm'));
                const response = await fetch('/test', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.error) {
                    resultDiv.innerHTML = '<div class="result-box error">❌ ' + data.error + '</div>';
                } else {
                    resultDiv.innerHTML = '<div class="result-box success"><strong>Results:</strong><br><pre>' + JSON.stringify(data, null, 2) + '</pre></div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="result-box error">❌ Error: ' + error.message + '</div>';
            }
        });
    </script>
</body>
</html>
